name: Explorer-Backend-CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches:
     - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (2025-11-17T15:57:55Z)
    - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0 (2025-12-04T03:00:25Z)
      with:
        distribution: temurin
        java-version: 11
        cache: sbt
    - name: Setup sbt launcher
      uses: sbt/setup-sbt@3e125ece5c3e5248e18da9ed8d2cce3d335ec8dd  # v1.1.14 (2025-10-05T20:19:35Z)
    - name: Check style and formatting
      run: sbt ";scalafmtCheck;test:scalafmtCheck;scalafmtSbtCheck;scalastyle;test:scalastyle;"
    - name: Test
      run: sbt test
    - name: Test assembly
      run: sbt app/assembly
