name: Release

on:
  push:
    tags: [ "v[0-9]+.[0-9]+.[0-9]+*" ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (2025-11-17T15:57:55Z)
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0 (2025-12-04T03:00:25Z)
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@3e125ece5c3e5248e18da9ed8d2cce3d335ec8dd  # v1.1.14 (2025-10-05T20:19:35Z)
      - name: Get the version
        id: get_version
        run: |
          version=$(echo ${GITHUB_REF/refs\/tags\//} | cut -c 2-)
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash
      - run: sbt app/assembly
      - name: Release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe  # v2.4.2 (2025-11-08T19:22:46Z)
        with:
          files:
            app/target/scala-2.13/explorer-backend-${{ steps.get_version.outputs.VERSION }}.jar
