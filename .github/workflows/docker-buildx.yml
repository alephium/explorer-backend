name: Build and publish docker image

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  buildx_and_push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (2025-11-17T15:57:55Z)
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3.7.0 (2025-11-05T15:03:37Z)
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435  # v3.11.1 (2025-06-18T08:40:20Z)

      - name: Get the version
        id: get_version
        run: |
          version=$(git describe --tags --abbrev=0)
          echo $version
          echo ${version:1}
          echo ::set-output name=VERSION::$version
          echo ::set-output name=VERSION-NO-V::${version:1}
        shell: bash

      - name: Log in to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  # v3.6.0 (2025-09-29T10:34:04Z)
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish docker image
        if: ${{ !contains(steps.get_version.outputs.VERSION, '-') }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0 (2025-05-27T16:39:16Z)
        with:
          context: docker/release
          file: ./docker/release/Dockerfile.release
          build-args: RELEASE=${{ steps.get_version.outputs.VERSION-NO-V }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            docker.io/alephium/explorer-backend:${{ steps.get_version.outputs.VERSION }}
            docker.io/alephium/explorer-backend:latest
          push: true

      - name: Build and publish docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0 (2025-05-27T16:39:16Z)
        with:
          context: docker/release
          file: ./docker/release/Dockerfile.release
          build-args: RELEASE=${{ steps.get_version.outputs.VERSION-NO-V }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            docker.io/alephium/dev-explorer-backend:${{ steps.get_version.outputs.VERSION-NO-V }}
            docker.io/alephium/dev-explorer-backend:latest
          push: true
