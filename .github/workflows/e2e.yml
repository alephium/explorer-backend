name: E2E

on:
  push:
    branches: [ master ]
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
    #######################
    #### Setup phases
    #######################
      - name: Checkout explorer-backend
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (2025-11-17T15:57:55Z)
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0 (2025-12-04T03:00:25Z)
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@3e125ece5c3e5248e18da9ed8d2cce3d335ec8dd  # v1.1.14 (2025-10-05T20:19:35Z)
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0 (2025-09-04T02:52:29Z)
        with:
          node-version: 18
      - name: Start full node
        run: |
          pushd e2e/docker
          docker compose up -d
          popd
          SECONDS=0
          until curl http://localhost:22973/infos/self-clique
          do
            if (( SECONDS > 60 ))
            then
               echo "Alephium full node not working after 1 min..."
               exit 1
            fi
            echo "Waiting..."
            sleep 5
          done
          echo "Alephium full node is up"
      - name: Start explorer-backend
        run: |
          export BLOCKFLOW_HOST=127.0.0.1
          export BLOCKFLOW_PORT=22973
          export BLOCKFLOW_NETWORK_ID=4
          export BLOCKFLOW_DIRECT_CLIQUE_ACCESS=true
          export DB_NAME=postgres
          sbt app/run &
          until curl http://localhost:9090/infos
          do
            if (( SECONDS > 300 ))
            then
               echo "explorer-backend not working after 5 min..."
               exit 1
            fi
            echo "Waiting..."
            sleep 5
          done
          echo "explorer-backend is up"
      #######################
      #### Test phase
      #######################
      - name: Run E2E tests
        run: |
          cd e2e
          npm i
          npm run test
